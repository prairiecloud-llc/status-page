# PrairieCloud Status Page — Upptime Configuration
# https://upptime.js.org/docs/configuration

owner: prairiecloud-llc
repo: status-page

sites:
  - name: API
    url: https://api.prairiecloud.io/health
    icon: https://prairiecloud.io/favicon-32x32.png
    expectedStatusCodes:
      - 200

status-website:
  cname: status.prairiecloud.io
  name: PrairieCloud Status
  logoUrl: https://prairiecloud.io/logo-light.jpg
  theme: dark
  js: |
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap';
    document.head.appendChild(link);
  css: |
    /* ── PrairieCloud Brand: Midnight Prairie ──────────── */

    /* Base */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0A1628 !important;
      color: #dce6f0;
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: #82C021;
    }

    /* Navigation */
    nav {
      background: #0d1f3c !important;
      border-bottom: 2px solid #195BA5;
      box-shadow: none;
    }

    nav a {
      color: #82C021 !important;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    nav a:hover {
      color: #ffffff !important;
    }

    /* Links */
    a { color: #348FC6; }
    a:hover { color: #82C021; }

    /* Site cards */
    .site {
      background: #0d1f3c;
      border: 1px solid #195BA5;
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 16px 20px;
    }

    /* Uptime graph bars */
    .day.up { background-color: #82C021 !important; }
    .day.down { background-color: #c0392b !important; }
    .day.no-data { background-color: #1e3050 !important; }

    /* Status badge — operational */
    .status-operational,
    .badge-success,
    [class*="operational"] {
      background-color: #107332 !important;
      color: #82C021 !important;
      border: 1px solid #82C021;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }

    /* Footer */
    footer {
      border-top: 1px solid #1e3050;
      color: #6B7C93;
      font-size: 0.85rem;
    }
  navbar:
    - title: PrairieCloud
      href: https://prairiecloud.io
    - title: API Docs
      href: https://docs.prairiecloud.io
    - title: Dashboard
      href: https://dashboard.prairiecloud.io

# Check every 5 minutes
workflowSchedule:
  uptime: "*/5 * * * *"
  graphs: "0 */6 * * *"
  staticSite: "0 */12 * * *"
  summary: "0 0 * * *"

# Commit settings
commitMessages:
  statusChange: "$PREFIX $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms) [skip ci] [upptime]"
  startCommit: "Initial status check"

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational
  incidentReport: "Incident report for $SITE_NAME — PrairieCloud"
  pastIncidents: Past incidents
  subscribeByRss: Subscribe via RSS
