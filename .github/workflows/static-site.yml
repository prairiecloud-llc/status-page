name: Static Site CI
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  pages: write
jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      # Debug: show what was built
      - name: List build output
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo "=== Looking for build output ==="
          find . -name "index.html" -not -path "./node_modules/*" 2>/dev/null || echo "No index.html found"
          for dir in __sapper__/export .svelte-kit/output dist build output site public; do
            if [ -d "$dir" ]; then
              echo "=== Found: $dir ==="
              ls -la "$dir"
            fi
          done

      # Deploy whatever we find
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./__sapper__/export
          cname: status.prairiecloud.io
          force_orphan: true
        continue-on-error: true
